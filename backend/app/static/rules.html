<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vigilis - Suppression Rules</title>
<link rel="stylesheet" href="/static/vigilis.css?v=8">
<style>
.container{max-width:1100px;margin:1.5rem auto;padding:0 2rem}

/* Summary stats */
.rule-stats{display:flex;gap:1.5rem;margin-bottom:1.5rem}
.rule-stat{text-align:center}
.rule-stat-val{font-size:1.8rem;font-weight:700;line-height:1.2}
.rule-stat-label{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:.1rem}

/* Suggestions section */
.sug-section{margin-bottom:2rem}
.sug-section h2{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.75rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
.sug-section h2 .sug-badge{background:rgba(251,191,36,.12);color:var(--yellow);padding:2px 8px;border-radius:10px;font-size:.68rem;text-transform:none;letter-spacing:0}
.sug-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.65rem;display:flex;gap:1rem;align-items:center;transition:border-color .2s}
.sug-card:hover{border-color:rgba(251,191,36,.3)}
.sug-count{font-size:1.6rem;font-weight:800;color:var(--yellow);min-width:50px;text-align:center;line-height:1}
.sug-count-label{font-size:.6rem;color:var(--dim);text-transform:uppercase;margin-top:2px}
.sug-info{flex:1;min-width:0}
.sug-title{font-weight:600;font-size:.9rem;margin-bottom:.2rem}
.sug-detail{font-size:.75rem;color:var(--dim)}
.sug-detail span{color:var(--text);font-weight:500}
.sug-empty{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;color:var(--dim);font-size:.85rem}

/* Wizard */
.wizard-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.wizard{width:560px;max-width:92vw;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 16px 48px rgba(0,0,0,.15);overflow:hidden}
.wizard-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.wizard-header h2{font-size:1rem;font-weight:700}
.wizard-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:1.2rem;padding:.25rem}
.wizard-close:hover{color:var(--text)}
.wizard-steps{display:flex;padding:0 1.5rem;gap:0;border-bottom:1px solid var(--border)}
.wizard-step{flex:1;text-align:center;padding:.6rem .25rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);font-weight:600;position:relative;transition:color .2s}
.wizard-step.active{color:var(--blue)}
.wizard-step.done{color:var(--green)}
.wizard-step::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;border-radius:1px;background:transparent;transition:background .2s}
.wizard-step.active::after{background:var(--blue)}
.wizard-step.done::after{background:var(--green)}
.wizard-body{padding:1.25rem 1.5rem;min-height:220px}
.wizard-footer{padding:.75rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end}

/* Wizard form elements */
.wz-field{margin-bottom:1rem}
.wz-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);font-weight:600;margin-bottom:.35rem;display:block}
.wz-input{width:100%;background:var(--surface-3);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;font-size:.85rem;color:var(--text);font-family:var(--font)}
.wz-input:focus{outline:none;border-color:var(--blue)}
.wz-select{width:100%;background:var(--surface-3);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;font-size:.85rem;color:var(--text);font-family:var(--font);cursor:pointer}
.wz-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.sev-checks{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.25rem}
.sev-check{display:flex;align-items:center;gap:.3rem;font-size:.82rem;cursor:pointer}
.sev-check input{accent-color:var(--blue)}
.conf-slider-wrap{display:flex;align-items:center;gap:.75rem;margin-top:.25rem}
.conf-slider{flex:1;accent-color:var(--blue)}
.conf-val{font-size:1rem;font-weight:700;font-family:var(--mono);min-width:35px;text-align:right}

/* Action cards */
.action-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
@media(max-width:500px){.action-cards{grid-template-columns:1fr}}
.action-card{background:var(--surface-3);border:2px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;cursor:pointer;transition:all .2s}
.action-card:hover{border-color:var(--blue)}
.action-card.selected{border-color:var(--green);background:rgba(52,211,153,.05)}
.action-card .ac-icon{font-size:1.5rem;margin-bottom:.35rem}
.action-card .ac-title{font-weight:600;font-size:.88rem;margin-bottom:.2rem}
.action-card .ac-desc{font-size:.72rem;color:var(--dim);line-height:1.4}

/* Preview */
.preview-box{background:var(--surface-3);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-top:.75rem}
.preview-match{font-size:1.3rem;font-weight:700;margin-bottom:.25rem}
.preview-match.has-matches{color:var(--green)}
.preview-match.no-matches{color:var(--dim)}
.preview-detail{font-size:.78rem;color:var(--dim)}
.preview-samples{margin-top:.5rem;font-size:.75rem}
.preview-sample{display:flex;gap:.5rem;padding:.2rem 0;color:var(--dim)}
.preview-sample .ps-type{color:var(--text);font-weight:500;min-width:180px}

/* Active rules */
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.65rem;display:flex;gap:1rem;align-items:center;transition:border-color .2s}
.rule-card:hover{border-color:rgba(96,165,250,.3)}
.rule-card.disabled{opacity:.5}
.rule-toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.rule-toggle input{opacity:0;width:0;height:0}
.rule-toggle .slider{position:absolute;inset:0;background:var(--border);border-radius:10px;cursor:pointer;transition:background .2s}
.rule-toggle .slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--dim);left:2px;top:2px;transition:all .2s}
.rule-toggle input:checked+.slider{background:var(--green)}
.rule-toggle input:checked+.slider::before{transform:translateX(16px);background:#fff}
.rule-body{flex:1;min-width:0}
.rule-name{font-weight:600;font-size:.9rem;margin-bottom:.2rem;display:flex;align-items:center;gap:.5rem}
.rule-conditions{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.3rem}
.rule-cond{font-size:.65rem;padding:2px 7px;border-radius:6px;background:var(--surface-2);color:var(--text);font-family:var(--mono)}
.rule-meta{font-size:.7rem;color:var(--dim);display:flex;gap:1rem}
.rule-hits{color:var(--green);font-weight:600}
.action-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.65rem;font-weight:600}
.action-auto_close{background:rgba(52,211,153,.12);color:var(--green)}
.action-auto_tag{background:rgba(167,139,250,.12);color:var(--purple)}
.action-reduce_priority{background:rgba(251,191,36,.12);color:var(--yellow)}
.rule-delete{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.78rem;padding:.25rem .4rem;border-radius:4px;transition:color .2s}
.rule-delete:hover{color:var(--red)}
</style>
</head>
<body>
<script src="/static/vigilis.js?v=10"></script>
<script>document.write(renderNav('rules'));</script>
<div class="container">

<div style="display:flex;align-items:center;gap:1rem;margin-bottom:.25rem">
 <h1 style="margin:0">Suppression Rules</h1>
 <button class="btn btn-primary" style="font-size:.82rem" onclick="openWizard()">+ New Rule</button>
</div>
<p class="subtitle">Reduce alert fatigue by auto-handling alerts that match known benign patterns.</p>

<!-- Stats -->
<div class="rule-stats" id="ruleStats"></div>

<!-- Suggestions -->
<div class="sug-section" id="sugSection"></div>

<!-- Active Rules -->
<div>
 <h2 style="font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.75rem;font-weight:600">Active Rules</h2>
 <div id="rulesList"><div class="spinner">Loading...</div></div>
</div>

</div>

<script>
/* ═══ Wizard State ═══ */
let wzStep=1;
let wzData={alertType:'',severity:[],confidenceMax:100,entityPatterns:{},action:'auto_close',name:''};

function openWizard(prefill){
 wzStep=1;
 wzData={alertType:'',severity:[],confidenceMax:100,entityPatterns:{},action:'auto_close',name:''};
 if(prefill){
  wzData.alertType=prefill.alertType||'';
  wzData.confidenceMax=prefill.confidenceMax||100;
  if(prefill.severity)wzData.severity=Array.isArray(prefill.severity)?prefill.severity:[];
 }
 renderWizard();
}

function closeWizard(){
 const el=document.getElementById('wizardOverlay');
 if(el)el.remove();
}

function renderWizard(){
 let existing=document.getElementById('wizardOverlay');
 if(!existing){
  existing=document.createElement('div');
  existing.id='wizardOverlay';
  existing.className='wizard-overlay';
  existing.onclick=(e)=>{if(e.target===existing)closeWizard()};
  document.body.appendChild(existing);
 }

 const steps=['Match','Narrow','Action','Confirm'];
 const stepHtml=steps.map((s,i)=>{
  const n=i+1;
  const cls=n===wzStep?'active':n<wzStep?'done':'';
  return `<div class="wizard-step ${cls}">${n}. ${s}</div>`;
 }).join('');

 let body='';
 if(wzStep===1)body=renderStep1();
 else if(wzStep===2)body=renderStep2();
 else if(wzStep===3)body=renderStep3();
 else if(wzStep===4)body=renderStep4();

 const canBack=wzStep>1;
 const isLast=wzStep===4;
 const nextLabel=wzStep===2?'Next (or Skip)':isLast?'Create Rule':'Next';

 existing.innerHTML=`<div class="wizard">
  <div class="wizard-header"><h2>New Suppression Rule</h2><button class="wizard-close" onclick="closeWizard()">&times;</button></div>
  <div class="wizard-steps">${stepHtml}</div>
  <div class="wizard-body">${body}</div>
  <div class="wizard-footer">
   ${canBack?'<button class="btn" onclick="wzBack()">Back</button>':''}
   <div style="flex:1"></div>
   ${wzStep===2?'<button class="btn" onclick="wzNext()" style="color:var(--dim)">Skip</button>':''}
   <button class="btn btn-primary" onclick="${isLast?'wzCreate()':'wzNext()'}">${nextLabel}</button>
  </div>
 </div>`;

 // Post-render hooks
 if(wzStep===4)runPreview();
}

/* ── Step Renderers ─── */
function renderStep1(){
 const sevOpts=['critical','high','medium','low'];
 const sevChecks=sevOpts.map(s=>`<label class="sev-check"><input type="checkbox" value="${s}" ${wzData.severity.includes(s)?'checked':''} onchange="wzToggleSev('${s}',this.checked)"> ${s}</label>`).join('');

 return `
  <div class="wz-field">
   <label class="wz-label">Alert Type Pattern</label>
   <input class="wz-input" id="wzAlertType" value="${wzData.alertType}" placeholder="identity.suspiciousSignIn or identity.* or leave blank for all" oninput="wzData.alertType=this.value">
  </div>
  <div class="wz-field">
   <label class="wz-label">Severity</label>
   <div class="sev-checks">${sevChecks}</div>
  </div>
  <div class="wz-field">
   <label class="wz-label">Max Confidence Score</label>
   <div class="conf-slider-wrap">
    <input type="range" class="conf-slider" min="0" max="100" value="${wzData.confidenceMax}" oninput="wzData.confidenceMax=parseInt(this.value);document.getElementById('confVal').textContent=this.value">
    <div class="conf-val" id="confVal">${wzData.confidenceMax}</div>
   </div>
   <div style="font-size:.72rem;color:var(--dim);margin-top:.25rem">Only suppress alerts with confidence at or below this threshold</div>
  </div>`;
}

function renderStep2(){
 return `
  <div style="font-size:.85rem;color:var(--dim);margin-bottom:1rem">Optional: narrow the rule to specific entities. Leave blank to match all.</div>
  <div class="wz-row">
   <div class="wz-field">
    <label class="wz-label">User / UPN Pattern</label>
    <input class="wz-input" value="${wzData.entityPatterns.user||''}" placeholder="*.service@contoso.com" oninput="wzData.entityPatterns.user=this.value">
   </div>
   <div class="wz-field">
    <label class="wz-label">IP Pattern</label>
    <input class="wz-input" value="${wzData.entityPatterns.ip||''}" placeholder="10.0.* or 192.168.1.1" oninput="wzData.entityPatterns.ip=this.value">
   </div>
  </div>
  <div class="wz-field">
   <label class="wz-label">Hostname Pattern</label>
   <input class="wz-input" value="${wzData.entityPatterns.hostname||''}" placeholder="srv-*.internal" oninput="wzData.entityPatterns.hostname=this.value">
  </div>`;
}

function renderStep3(){
 const actions=[
  {id:'auto_close',icon:'<svg width="24" height="24" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,10 8,14 16,6"/></svg>',title:'Auto-Close',desc:'Mark matching alerts as benign automatically. Best for known false positives.',color:'var(--green)'},
  {id:'auto_tag',icon:'<svg width="24" height="24" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10 V4 a1 1 0 011-1 h6 l7 7 -7 7 Z"/><circle cx="7" cy="7" r="1" fill="currentColor"/></svg>',title:'Auto-Tag',desc:'Add a tag to matching alerts for later review. Good for patterns you\'re still evaluating.',color:'var(--purple)'},
  {id:'reduce_priority',icon:'<svg width="24" height="24" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,8 10,14 14,8"/></svg>',title:'Reduce Priority',desc:'Lower the severity of matching alerts. Keeps them visible but deprioritized.',color:'var(--yellow)'},
 ];
 return `<div style="font-size:.85rem;color:var(--dim);margin-bottom:1rem">What should happen when an alert matches this rule?</div>
  <div class="action-cards">${actions.map(a=>`
   <div class="action-card ${wzData.action===a.id?'selected':''}" onclick="wzData.action='${a.id}';renderWizard()">
    <div class="ac-icon" style="color:${a.color}">${a.icon}</div>
    <div class="ac-title">${a.title}</div>
    <div class="ac-desc">${a.desc}</div>
   </div>`).join('')}
  </div>`;
}

function renderStep4(){
 const autoName=wzData.alertType
  ?`Auto-${wzData.action.replace('_','-')} ${wzData.alertType} (conf <= ${wzData.confidenceMax})`
  :`Auto-${wzData.action.replace('_','-')} all alerts (conf <= ${wzData.confidenceMax})`;
 if(!wzData.name)wzData.name=autoName;

 let condSummary=[];
 if(wzData.alertType)condSummary.push(`Alert type: <b>${wzData.alertType}</b>`);
 if(wzData.severity.length)condSummary.push(`Severity: <b>${wzData.severity.join(', ')}</b>`);
 condSummary.push(`Confidence: <b>&le; ${wzData.confidenceMax}</b>`);
 const ep=wzData.entityPatterns;
 if(ep.user)condSummary.push(`User: <b>${ep.user}</b>`);
 if(ep.ip)condSummary.push(`IP: <b>${ep.ip}</b>`);
 if(ep.hostname)condSummary.push(`Host: <b>${ep.hostname}</b>`);

 return `
  <div class="wz-field">
   <label class="wz-label">Rule Name</label>
   <input class="wz-input" id="wzName" value="${wzData.name}" oninput="wzData.name=this.value">
  </div>
  <div style="font-size:.82rem;margin-bottom:.75rem">
   <div style="color:var(--dim);margin-bottom:.35rem">Conditions:</div>
   ${condSummary.map(s=>'<div style="padding:1px 0">'+s+'</div>').join('')}
   <div style="margin-top:.35rem">Action: <span class="action-badge action-${wzData.action}">${wzData.action.replace('_',' ')}</span></div>
  </div>
  <div class="preview-box" id="previewBox"><div style="color:var(--dim);font-size:.82rem">Testing rule against existing cases...</div></div>`;
}

/* ── Wizard Navigation ─── */
function wzToggleSev(sev,checked){
 if(checked&&!wzData.severity.includes(sev))wzData.severity.push(sev);
 if(!checked)wzData.severity=wzData.severity.filter(s=>s!==sev);
}

function wzNext(){
 if(wzStep===1){
  wzData.alertType=document.getElementById('wzAlertType')?.value||wzData.alertType;
 }
 wzStep=Math.min(wzStep+1,4);
 renderWizard();
}

function wzBack(){wzStep=Math.max(wzStep-1,1);renderWizard()}

async function runPreview(){
 const conditions=buildConditions();
 try{
  const r=await fetch('/api/v1/rules/test',{
   method:'POST',headers:{'Content-Type':'application/json','X-API-Key':AK},
   body:JSON.stringify({conditions})
  });
  const data=await r.json();
  const el=document.getElementById('previewBox');
  if(!el)return;
  const pct=data.totalCases?Math.round(data.matchCount/data.totalCases*100):0;
  let html=`<div class="preview-match ${data.matchCount?'has-matches':'no-matches'}">${data.matchCount} of ${data.totalCases} existing cases would match (${pct}%)</div>`;
  if(data.samples&&data.samples.length){
   html+='<div class="preview-samples">';
   data.samples.slice(0,5).forEach(s=>{
    html+=`<div class="preview-sample"><span class="ps-type">${s.alertType}</span> <span class="tag tag-${s.severity}">${s.severity}</span> conf:${s.confidence} <span class="tag tag-${s.disposition}">${s.disposition}</span></div>`;
   });
   if(data.matchCount>5)html+=`<div style="color:var(--dim);padding-top:.2rem">...and ${data.matchCount-5} more</div>`;
   html+='</div>';
  }
  el.innerHTML=html;
 }catch(e){
  const el=document.getElementById('previewBox');
  if(el)el.innerHTML='<div style="color:var(--dim)">Preview unavailable</div>';
 }
}

function buildConditions(){
 const c={};
 if(wzData.alertType)c.alertType=wzData.alertType;
 if(wzData.severity.length)c.severity=wzData.severity;
 if(wzData.confidenceMax<100)c.confidenceMax=wzData.confidenceMax;
 const ep={};
 if(wzData.entityPatterns.user)ep.user=wzData.entityPatterns.user;
 if(wzData.entityPatterns.ip)ep.ip=wzData.entityPatterns.ip;
 if(wzData.entityPatterns.hostname)ep.hostname=wzData.entityPatterns.hostname;
 if(Object.keys(ep).length)c.entityPatterns=ep;
 return c;
}

async function wzCreate(){
 wzData.name=document.getElementById('wzName')?.value||wzData.name;
 const body={
  name:wzData.name||'Unnamed Rule',
  conditions:buildConditions(),
  action:wzData.action,
 };
 const r=await fetch('/api/v1/rules',{
  method:'POST',headers:{'Content-Type':'application/json','X-API-Key':AK},
  body:JSON.stringify(body)
 });
 if(r.ok){closeWizard();toast('Rule created','ok');loadAll()}
 else toast('Failed to create rule','');
}

/* ═══ Suggestions ═══ */
async function loadSuggestions(){
 try{
  const r=await fetch('/api/v1/rules/suggestions?minCount=2',{headers:{'X-API-Key':AK}});
  const sug=await r.json();
  const el=document.getElementById('sugSection');
  if(!sug.length){
   el.innerHTML=`<h2>Smart Suggestions</h2>
    <div class="sug-empty">No patterns detected yet. As you triage cases, Vigilis will learn which alert types are frequently benign and suggest rules here.</div>`;
   return;
  }
  let html=`<h2>Smart Suggestions <span class="sug-badge">${sug.length} found</span></h2>`;
  sug.forEach(s=>{
   const conds=JSON.stringify(s.suggestedRule.conditions||{}).replace(/"/g,'&quot;');
   html+=`<div class="sug-card">
    <div style="text-align:center"><div class="sug-count">${s.benignCount}</div><div class="sug-count-label">benign</div></div>
    <div class="sug-info">
     <div class="sug-title">${s.suggestedRule.name}</div>
     <div class="sug-detail"><span>${s.alertType}</span> &middot; avg confidence ${s.avgConfidence} &middot; marked benign ${s.benignCount} times</div>
    </div>
    <button class="btn btn-primary" style="font-size:.78rem;flex-shrink:0" onclick="quickCreate('${s.suggestedRule.name.replace(/'/g,"\\'")}',${conds},'${s.suggestedRule.action}')">Create Rule</button>
   </div>`;
  });
  el.innerHTML=html;
 }catch(e){}
}

async function quickCreate(name,conditions,action){
 const r=await fetch('/api/v1/rules',{
  method:'POST',headers:{'Content-Type':'application/json','X-API-Key':AK},
  body:JSON.stringify({name,conditions,action})
 });
 if(r.ok){toast('Rule created','ok');loadAll()}
 else toast('Failed','');
}

/* ═══ Active Rules ═══ */
async function loadRules(){
 const r=await fetch('/api/v1/rules',{headers:{'X-API-Key':AK}});
 const rules=await r.json();

 // Stats
 const active=rules.filter(r=>r.enabled).length;
 const totalHits=rules.reduce((s,r)=>s+r.hitsCount,0);
 document.getElementById('ruleStats').innerHTML=`
  <div class="rule-stat"><div class="rule-stat-val" style="color:var(--text)">${rules.length}</div><div class="rule-stat-label">Total Rules</div></div>
  <div class="rule-stat"><div class="rule-stat-val" style="color:var(--text)">${active}</div><div class="rule-stat-label">Active</div></div>
  <div class="rule-stat"><div class="rule-stat-val" style="color:var(--text)">${totalHits}</div><div class="rule-stat-label">Total Hits</div></div>`;

 if(!rules.length){
  document.getElementById('rulesList').innerHTML='<div style="text-align:center;padding:2rem;color:var(--dim);font-size:.88rem">No rules yet. Create one above or check the Smart Suggestions.</div>';
  return;
 }

 let html='';
 rules.forEach(rule=>{
  const conds=rule.conditions||{};
  let chips='';
  if(conds.alertType)chips+=`<span class="rule-cond">${conds.alertType}</span>`;
  if(conds.confidenceMax!=null)chips+=`<span class="rule-cond">conf &le; ${conds.confidenceMax}</span>`;
  if(conds.severity)chips+=`<span class="rule-cond">sev: ${conds.severity.join(',')}</span>`;
  if(conds.entityPatterns){
   const ep=conds.entityPatterns;
   if(ep.user)chips+=`<span class="rule-cond">user: ${ep.user}</span>`;
   if(ep.ip)chips+=`<span class="rule-cond">ip: ${ep.ip}</span>`;
   if(ep.hostname)chips+=`<span class="rule-cond">host: ${ep.hostname}</span>`;
  }

  html+=`<div class="rule-card ${rule.enabled?'':'disabled'}">
   <label class="rule-toggle"><input type="checkbox" ${rule.enabled?'checked':''} onchange="toggleRule(${rule.id},${rule.enabled})"><span class="slider"></span></label>
   <div class="rule-body">
    <div class="rule-name">${rule.name} <span class="action-badge action-${rule.action}">${rule.action.replace(/_/g,' ')}</span></div>
    <div class="rule-conditions">${chips||'<span style="color:var(--dim);font-size:.68rem">Matches all alerts</span>'}</div>
    <div class="rule-meta">
     <span>Hits: <span class="rule-hits">${rule.hitsCount}</span></span>
     <span>Created ${new Date(rule.createdAt).toLocaleDateString()}</span>
    </div>
   </div>
   <button class="rule-delete" onclick="deleteRule(${rule.id})" title="Delete rule">&times;</button>
  </div>`;
 });
 document.getElementById('rulesList').innerHTML=html;
}

async function toggleRule(id,enabled){
 await fetch('/api/v1/rules/'+id,{
  method:'PATCH',headers:{'Content-Type':'application/json','X-API-Key':AK},
  body:JSON.stringify({enabled:!enabled})
 });
 loadRules();
}

async function deleteRule(id){
 await fetch('/api/v1/rules/'+id,{method:'DELETE',headers:{'X-API-Key':AK}});
 toast('Rule deleted','ok');
 loadAll();
}

/* ═══ URL Prefill ═══ */
function checkPrefill(){
 const params=new URLSearchParams(location.search);
 const fromCase=params.get('from');
 if(fromCase){
  // Fetch case data to pre-fill wizard
  fetch('/api/v1/cases/'+fromCase,{headers:{'X-API-Key':AK}})
   .then(r=>r.ok?r.json():null)
   .then(c=>{
    if(c){openWizard({alertType:c.alertType,confidenceMax:Math.min((c.confidence?.score||50)+10,100),severity:[c.severity]})}
    else{openWizard()}
   }).catch(()=>openWizard());
 }
}

function loadAll(){loadSuggestions();loadRules()}
loadAll();
checkPrefill();
</script>
